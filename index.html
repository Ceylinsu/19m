<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs AR - Stabil Versiyon</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }
        #startButton {
            padding: 15px 40px; font-size: 18px; background: #27ae60;
            color: white; border: none; border-radius: 30px; cursor: pointer;
            font-weight: bold; letter-spacing: 1px;
        }
        .instruction { margin-top: 15px; font-size: 14px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startButton">KAMERAYI AÇ VE BAŞLAT</button>
        <div class="instruction">Resmi kameraya gösterdiğinizde video başlayacaktır.</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
             color-space="sRGB" renderer="colorManagement: true,
