<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs AR - Otomatik Başlat</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Yükleniyor yazısı (Sistem açılana kadar kullanıcıya bilgi verir) */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center;
            align-items: center; z-index: 9999; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="loading">Sistem Hazırlanıyor...</div>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" 
                   src="./resim_video/19mayis1.mp4" 
                   preload="auto" 
                   loop="true" 
                   crossorigin="anonymous" 
                   playsinline 
                   webkit-playsinline 
                   muted>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" 
                     width="1" 
                     height="0.75" 
                     position="0 0 0" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#arVideo");
        const loading = document.querySelector("#loading");
        const sceneEl = document.querySelector('a-scene');

        // Sahne yüklendiğinde "Sistem Hazırlanıyor" yazısını kaldır
        sceneEl.addEventListener("ready", () => {
            loading.style.display = "none";
        });

        const targetEntity = document.querySelector('#targetEntity');

        // Resim bulunduğu an video direkt oynar (çünkü muted: true)
        targetEntity.addEventListener("targetFound", () => {
            video.play();
        });

        // Resim kaybolduğunda video durur
        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
