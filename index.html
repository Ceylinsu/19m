<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs AR Projesi</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Kullanıcı etkileşimi için Başlat Butonu (Tarayıcı kısıtlamaları için zorunludur) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #e62117;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startButton">Deneyimi Başlat</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" 
                   src="./resim_video/19mayis1.mp4" 
                   preload="auto" 
                   loop="true" 
                   crossorigin="anonymous" 
                   playsinline 
                   webkit-playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" 
                     width="2.5" 
                     height="1.41" 
                     position="0 0 0.1" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const video = document.querySelector("#arVideo");

        // Kullanıcı butona bastığında videoyu "uyandırıyoruz"
        startButton.addEventListener('click', () => {
            video.play();
            video.pause(); 
            overlay.style.display = "none";
        });

        // Resim algılandığında videoyu başlat, resim kaybolduğunda durdur
        const targetEntity = document.querySelector('[mindar-image-target]');
        
        targetEntity.addEventListener("targetFound", event => {
            console.log("Hedef bulundu");
            video.play();
        });

        targetEntity.addEventListener("targetLost", event => {
            console.log("Hedef kayboldu");
            video.pause();
        });
    </script>
</body>
</html>
