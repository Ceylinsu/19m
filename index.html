<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Mayıs AR - Tam Ekran</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Tüm ekranı kaplayan ve dokunulabilir siyah perde */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; font-size: 24px; font-weight: bold;
            cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        BAŞLAMAK İÇİN EKRANA DOKUNUNUZ
    </div>

    <a-scene mindar-image="imageTargetSrc: ./resim_video/targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="./resim_video/19mayis1.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" 
                     width="1" 
                     height="0.75" 
                     position="0 0 0" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const overlay = document.querySelector("#overlay");
        const video = document.querySelector("#arVideo");

        // Kullanıcı ekranda herhangi bir yere dokunduğunda çalışır
        overlay.addEventListener('click', () => {
            video.play();
            video.pause(); // Tarayıcı kilidini açmak için oynat-durdur taktiği
            overlay.style.display = "none"; // Siyah ekranı gizle
        });

        // Kamerada hedef resim (Atatürk) bulunduğunda videoyu oynat
        const targetEntity = document.querySelector('[mindar-image-target]');
        targetEntity.addEventListener("targetFound", () => { 
            video.play(); 
        });
        
        // Kamera resimden uzaklaştığında videoyu duraklat
        targetEntity.addEventListener("targetLost", () => { 
            video.pause(); 
        });
    </script>
</body>
</html>
